# Project-local RTK filters — commit this file with your repo.
# Filters here override user-global and built-in filters.
# Docs: https://github.com/rtk-ai/rtk#custom-filters
schema_version = 1

# Example: suppress build noise from a custom tool
# [filters.my-tool]
# description = "Compact my-tool output"
# match_command = "^my-tool\\s+build"
# strip_ansi = true
# strip_lines_matching = ["^\\s*$", "^Downloading", "^Installing"]
# max_lines = 30
# on_empty = "my-tool: ok"

[filters.serena-noise]
description = "Membersihkan log teknis Serena MCP"
match_command = "^serena|^uvx\\s+serena" # Mencocokkan perintah serena
strip_ansi = true # Menghapus kode warna terminal yang boros token
strip_lines_matching = [
    "^\\s*$",                  # Baris kosong
    "Language server.*",        # Log koneksi LSP
    "uvx progress.*",          # Progress bar dari uvx
    ".*stderr.*",              # Log error teknis yang sering muncul di stdout
    "DEBUG.*",                 # Log debug
    "Checking version.*"       # Info update otomatis
]
max_lines = 50                # Jangan kirim lebih dari 50 baris ke Claude
on_empty = "Serena: Tool executed successfully with no noise."

